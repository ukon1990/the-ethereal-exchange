  /realms/{region}/{slug}:
    $ref: ./paths/realm-detail.yml
  /auctions/search:
    $ref: ./paths/auction-market-search.yml
  /auctions/search/filters:
    $ref: ./paths/auction-market-search-filters.yml
  /auctions/items/detail:
    $ref: ./paths/auction-market-item-detail.yml
  /crafting/items/analytics:
    $ref: ./paths/auction-market-item-crafting-analytics.yml
  /crafting/search:
    $ref: ./paths/crafting-market-search.yml
  /crafting/filters:
    $ref: ./paths/crafting-market-search-filters.yml
