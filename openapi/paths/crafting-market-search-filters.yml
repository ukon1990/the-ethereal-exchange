get:
  tags:
    - CraftingMarket
  operationId: filters
  summary: Return crafting search filter definitions
  description: Returns profession options for crafting market filters.
  parameters:
    - name: region
      in: query
      required: true
      schema:
        type: string
        enum: [us, eu, kr, tw]
    - name: realmSlug
      in: query
      required: true
      schema:
        type: string
    - name: locale
      in: query
      required: false
      schema:
        type: string
  responses:
    "200":
      description: Filter definitions.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/auction-market-filter-response.yml
    "400":
      description: Invalid filter request.
    "404":
      description: Realm was not found.
